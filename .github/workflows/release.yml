name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Check out tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $package = Get-Content -LiteralPath package.json -Raw | ConvertFrom-Json
          $expectedTag = "v$($package.version)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $($package.version)."
          }
          "NOTE_VERSION=$($package.version)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install locked dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm run package:installer
          if ($LASTEXITCODE -ne 0) {
            throw "Windows installer build failed with exit code $LASTEXITCODE."
          }
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $installerName = "Note-$env:NOTE_VERSION-setup.exe"
          $installerPath = Join-Path release $installerName
          if (-not (Test-Path -LiteralPath $installerPath)) {
            throw "Expected installer was not created: $installerPath"
          }
          $hash = (Get-FileHash -LiteralPath $installerPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $installerName" | Set-Content -LiteralPath release/SHA256SUMS.txt -Encoding ascii
          "INSTALLER_PATH=$installerPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish GitHub Release
        shell: pwsh
        run: |
          $releaseApi = "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:GITHUB_REF_NAME"
          $existingDraft = gh api $releaseApi --jq '.draft' 2> $null
          if ($LASTEXITCODE -eq 0) {
            if ($existingDraft -eq "false") {
              Write-Host "Release $env:GITHUB_REF_NAME is already published; immutable releases are never overwritten."
              exit 0
            }
          } else {
            gh release create $env:GITHUB_REF_NAME --draft --verify-tag --generate-notes --title "Note $env:NOTE_VERSION" --repo $env:GITHUB_REPOSITORY
            if ($LASTEXITCODE -ne 0) {
              throw "GitHub Release draft creation failed with exit code $LASTEXITCODE."
            }
          }

          gh release upload $env:GITHUB_REF_NAME $env:INSTALLER_PATH release/SHA256SUMS.txt --clobber --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release asset upload failed with exit code $LASTEXITCODE."
          }

          gh release edit $env:GITHUB_REF_NAME --draft=false --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release publishing failed with exit code $LASTEXITCODE."
          }
        env:
          GH_TOKEN: ${{ github.token }}
